version: 2

updates:
  # Streamlit Container Runtime app
  - package-ecosystem: pip
    directory: /streamlit
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    reviewers:
      - sfc-gh-jkang
    open-pull-requests-limit: 5
    groups:
      streamlit-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps(streamlit)
      include: scope
    labels:
      - dependencies
      - streamlit

  # Test suite (pytest, snowflake-connector-python, etc.)
  - package-ecosystem: pip
    directory: /tests
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    reviewers:
      - sfc-gh-jkang
    open-pull-requests-limit: 3
    groups:
      tests-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps(tests)
      include: scope
    labels:
      - dependencies
      - tests

  # GitHub Actions workflow itself
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    reviewers:
      - sfc-gh-jkang
    open-pull-requests-limit: 2
    commit-message:
      prefix: deps(actions)
    labels:
      - dependencies
      - github-actions
